<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - REFERALLS</title>
  <link rel="icon" href="./assets/vendors/favicon_io/favicon-32x32.png">

  <link rel="stylesheet" href="./assets/css/access.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="reg d-flex justify-content-center align-items-center">

  <section class="m-2">
    <div class="container">
      <h2>Create Account</h2>
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <div class="form-check mt-2">
        <input class="form-check-input" type="checkbox" id="isDispatchWorker" required>
      </div>
      <button id="signupBtn" class="mt-4 w-100 btn btn-success">Sign Up</button>
      <p class="mt-3 text-center">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </section>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
import { doc, setDoc, collection, query, where, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// get referral code from URL if present
const urlParams = new URLSearchParams(window.location.search);
const referralCode = urlParams.get("ref"); 

async function signup() {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const isDispatchWorker = document.getElementById("isDispatchWorker").checked;

  if (!username || !email || !password) {
    alert("Please fill in all fields");
    return;
  }

  try {
    // Firebase Auth
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const userId = userCred.user.uid;

    // Generate referral code
    const myReferralCode = Math.random().toString(36).substring(2, 10);

    // Save in Firestore
    await setDoc(doc(db, "users", userId), {
      uid: userId,
      username,
      email,
      referralCode: myReferralCode,
      referredBy: referralCode || null,
      points: 0,
      isAdmin: false,
      isDispatchWorker: isDispatchWorker,
      createdAt: new Date()
    });

    // Update referrer's points if referral code exists
    if (referralCode) {
      const q = query(collection(db, "users"), where("referralCode", "==", referralCode));
      const snapshot = await getDocs(q);
      if (!snapshot.empty) {
        const refDoc = snapshot.docs[0];
        const prevPoints = refDoc.data().points || 0;
        await updateDoc(refDoc.ref, { points: prevPoints + 20 });
      }
    }

    alert("✅ Account created successfully! Please login.");
    window.location.href = "login.html";

  } catch (err) {
    console.error("Signup error:", err);
    if (err.code === "auth/email-already-in-use") {
      alert("Email already in use. Try logging in instead.");
    } else if (err.code === "auth/invalid-email") {
      alert("Invalid email address.");
    } else if (err.code === "auth/weak-password") {
      alert("Password should be at least 6 characters.");
    } else {
      alert("Error: " + (err.message || err));
    }
  }
}

document.getElementById("signupBtn").addEventListener("click", signup);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
