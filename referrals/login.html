<body class="log d-flex justify-content-center align-items-center">

  <section class="m-2">
    <div class="container">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button id="loginBtn" class="mt-4">Login</button>
      <p>Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </section>

  <script type="module">
  import { auth } from "./firebase.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

  async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Please enter both email and password");
      return;
    }

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);

      // Optional: save user info in localStorage for later
      localStorage.setItem("user", JSON.stringify({
        uid: userCred.user.uid,
        email: userCred.user.email
      }));

      alert("Welcome " + email + "!");
      window.location.href = "index.html";
    } catch (err) {
      alert("Error: " + err.message);
      console.error(err);
    }
  }

  // Attach login function to the button
  document.getElementById("loginBtn").addEventListener("click", login);

  console.log("Firebase connected on login.html");
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
