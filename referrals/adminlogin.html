<head>

  <!--icon-->
  <link rel="icon" href="./assets/vendors/favicon_io/favicon-16x16.png">
  <!--main-->
  <link rel="stylesheet" href="./assets/css/access.css">
  <!--vendor-->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="log d-flex justify-content-center align-items-center">

  <section class="m-2">
    <div class="container">
      <h2>Admin Login</h2>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button id="adminLoginBtn" class="mt-4">Login</button>
      <p><a href="login.html">← Back to User Login</a></p>
    </div>
  </section>

  <script type="module">
  import { auth, db } from "./firebase.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
  import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

  async function adminLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Please enter both email and password");
      return;
    }

    try {
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const userId = userCred.user.uid;

      // Check if user is admin
      const q = query(collection(db, "users"), where("uid", "==", userId));
      const snapshot = await getDocs(q);

      if (!snapshot.empty) {
        const userData = snapshot.docs[0].data();
        if (userData.isAdmin) {
          // ✅ Redirect to admin page
          window.location.href = "admin.html";
        } else {
          alert("Access denied. You are not an admin.");
          await auth.signOut();
        }
      } else {
        alert("User not found in database.");
      }

    } catch (err) {
      alert("Error: " + err.message);
      console.error(err);
    }
  }

  // ✅ Corrected event listener
  document.getElementById("adminLoginBtn").addEventListener("click", adminLogin);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
