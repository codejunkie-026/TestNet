  <h2 class="">🔥 Flash Sale Bidding</h2>
  <div id="flashContainer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js"></script>

  <script>
  // TODO: Replace with your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBnzsTMXV6o8fNhosp_7U6o3xFEQbsQIl8",
    authDomain: "referral-backend-3a9c3.firebaseapp.com",
    projectId: "referral-backend-3a9c3",
    storageBucket: "referral-backend-3a9c3.appspot.com",
    messagingSenderId: "394999402090",
    appId: "1:394999402090:web:5b77df3f12f00f5ab58413"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Real-time listener for flash sale products
  db.collection("flash_sale").orderBy("timestamp", "desc")
    .onSnapshot(snapshot => {
      const container = document.getElementById("flashContainer");
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "flash-card";

        div.innerHTML = `
          <img src="${data.imageUrl}">
          <h3>${data.name}</h3>
          <p>${data.description}</p>
          <p>Old Price: ₦${data.oldPrice}</p>
          <p>Current Bid: ₦<span id="bid-${doc.id}">${data.startPrice}</span></p>
          <p>Current Highest Bidder: <span id="bidder-${doc.id}">${data.highestBidder || "None"}</span></p>
          <p>Time Left: <span id="timer-${doc.id}"></span></p>
          <input type="number" id="input-${doc.id}" placeholder="Your Bid">
          <button onclick="placeBid('${doc.id}', ${data.startPrice})">Place Bid</button>
        `;

        container.appendChild(div);

        // Start countdown
        if (data.endsAt) {
          const endTime = data.endsAt.toDate().getTime();
          startCountdown(endTime, doc.id);
        }
      });
    });

  // Place a bid
  window.placeBid = async (id, currentBid) => {
    const input = document.getElementById(`input-${id}`);
    const bid = Number(input.value);
    const user = prompt("Enter your name for this bid:");

    if (!bid || bid <= currentBid) {
      alert("Your bid must be higher than the current bid!");
      return;
    }
    if (!user) {
      alert("Please enter your name to bid!");
      return;
    }

    await db.collection("flash_sale").doc(id).update({
      startPrice: bid,
      highestBidder: user
    });

    alert(`Bid placed successfully! Current highest bidder: ${user}`);
  };

  // Countdown timer function
  function startCountdown(endTime, id) {
    const timerEl = document.getElementById(`timer-${id}`);

    const interval = setInterval(async () => {
      const now = new Date().getTime();
      const distance = endTime - now;

      const doc = await db.collection("flash_sale").doc(id).get();
      const data = doc.data();

      // Update highest bidder live
      const bidderEl = document.getElementById(`bidder-${id}`);
      if (bidderEl) bidderEl.innerText = data.highestBidder || "None";

      if (distance <= 0) {
        clearInterval(interval);
        timerEl.innerText = "Sale Ended";

        const input = document.getElementById(`input-${id}`);
        const button = document.querySelector(`button[onclick*='${id}']`);

        if (input) input.disabled = true;
        if (button) button.disabled = true;

        // Highlight winner
        if (data.highestBidder) {
          const winnerDiv = document.createElement("div");
          winnerDiv.className = "winner";
          winnerDiv.innerText = `Winner: ${data.highestBidder}`;
          timerEl.parentNode.appendChild(winnerDiv);
        } else {
          const winnerDiv = document.createElement("div");
          winnerDiv.className = "winner";
          winnerDiv.innerText = "No bids placed";
          timerEl.parentNode.appendChild(winnerDiv);
        }

        return;
      }

      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      timerEl.innerText = `${hours}h ${minutes}m ${seconds}s`;
    }, 1000);
  }
  </script>
